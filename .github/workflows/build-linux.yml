name: build-linux
on:
    workflow_call:
        inputs:
            dry:
                default: false
                description: Prevent signing and upload
                required: false
                type: boolean
        secrets:
            TAURI_PRIVATE_KEY:
                required: false
            TAURI_KEY_PASSWORD:
                required: false

permissions:
    contents: read

jobs:
    build-linux:
        runs-on: ubuntu-22.04
        env:
            HAS_TAURI_SIGNING: ${{ secrets.TAURI_PRIVATE_KEY != '' }}
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: lts/*

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7

            - uses: swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
              with:
                  workspaces: './src-tauri -> target'
                  key: 'ubuntu-22.04-fresh'

            - name: Install pnpm
              run: npm install -g pnpm@11.8.0

            - name: Install Linux deps (official + extras)
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libwebkit2gtk-4.1-dev \
                    libayatana-appindicator3-dev \
                    librsvg2-dev \
                    librsvg2-bin \
                    patchelf \
                    libasound2-dev \
                    libxdo-dev \
                    build-essential \
                    pkg-config \
                    libssl-dev \
                    libgtk-3-dev \
                    unzip

            - name: Download & extract ONNX model (Linux)
              if: ${{ inputs.dry == false }}
              shell: bash
              run: bash .github/scripts/download-parakeet-model.sh resources

            - name: Install frontend deps
              run: pnpm install

            - name: Remove Windows-only hotkey resource
              shell: bash
              run: |
                  node <<'NODE'
                  const fs = require('fs');
                  const path = 'src-tauri/tauri.conf.json';
                  const config = JSON.parse(fs.readFileSync(path, 'utf8'));
                  config.bundle.resources = config.bundle.resources.filter(
                    (resource) => resource !== '../hotkeys/target/release/hyperyap-hotkeys.exe'
                  );
                  fs.writeFileSync(path, `${JSON.stringify(config, null, 4)}\n`);
                  NODE

            - name: Build
              run: pnpm tauri build ${{ inputs.dry && '--no-bundle' || '--bundles appimage,deb' }}

            - name: Fix AppImage .DirIcon absolute symlink
              if: ${{ inputs.dry == false }}
              shell: bash
              run: |
                  APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" | head -1)
                  if [ -n "$APPIMAGE" ]; then
                    chmod +x "$APPIMAGE"
                    "$APPIMAGE" --appimage-extract
                    cd squashfs-root
                    rm -f .DirIcon
                    ln -s hyperyap.png .DirIcon
                    cd ..
                    wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
                    chmod +x appimagetool-x86_64.AppImage
                    ARCH=x86_64 ./appimagetool-x86_64.AppImage squashfs-root "$APPIMAGE"
                    rm -rf squashfs-root appimagetool-x86_64.AppImage
                  fi

            - name: Restore Tauri signing key
              if: ${{ inputs.dry == false && env.HAS_TAURI_SIGNING == 'true' }}
              env:
                  TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
              run: echo "$TAURI_PRIVATE_KEY" | base64 -d > tauri.key

            - name: Sign AppImage(s) with Tauri signer
              if: ${{ inputs.dry == false && env.HAS_TAURI_SIGNING == 'true' }}
              env:
                  TAURI_PRIVATE_KEY_PATH: tauri.key
                  TAURI_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
              shell: bash
              run: |
                  files=$(find src-tauri/target/release/bundle -type f -name "*.AppImage")
                  if [ -n "$files" ]; then
                    pnpm tauri signer sign $files
                  else
                    echo "No AppImage found to sign."
                  fi

            - name: Sign deb with Tauri signer
              if: ${{ inputs.dry == false && env.HAS_TAURI_SIGNING == 'true' }}
              env:
                  TAURI_PRIVATE_KEY_PATH: tauri.key
                  TAURI_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
              shell: bash
              run: |
                  files=$(find src-tauri/target/release/bundle -type f -name "*.deb")
                  if [ -n "$files" ]; then
                    pnpm tauri signer sign $files
                  else
                    echo "No deb found to sign."
                  fi

            - name: Rename AppImage files to remove version and add architecture
              if: ${{ inputs.dry == false }}
              shell: bash
              run: |
                  find src-tauri/target/release/bundle -name "*.AppImage" -exec sh -c 'mv "$1" "$(dirname "$1")/HyperYap_amd64.AppImage"' _ {} \;
                  find src-tauri/target/release/bundle -name "*.AppImage.sig" -exec sh -c 'mv "$1" "$(dirname "$1")/HyperYap_amd64.AppImage.sig"' _ {} \;

            - name: Rename deb files
              if: ${{ inputs.dry == false }}
              shell: bash
              run: |
                  find src-tauri/target/release/bundle -name "*.deb" ! -name "*.sig" -exec sh -c 'mv "$1" "$(dirname "$1")/HyperYap_amd64.deb"' _ {} \;
                  find src-tauri/target/release/bundle -name "*.deb.sig" -exec sh -c 'mv "$1" "$(dirname "$1")/HyperYap_amd64.deb.sig"' _ {} \;

            - name: Upload artifact (1 day)
              if: ${{ inputs.dry == false }}
              uses: actions/upload-artifact@v4
              with:
                  name: hyperyap-linux
                  path: |
                      src-tauri/target/release/bundle/**/*.AppImage
                      src-tauri/target/release/bundle/**/*.deb
                      src-tauri/target/release/bundle/**/*.sig
                  retention-days: 1
